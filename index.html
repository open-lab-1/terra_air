<!DOCTYPE html>
<html>
<head>
  <title>Terra Air</title>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #eee;
      text-align: center;
    }
    .card {
      background: #222;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      min-width: 200px;
    }
    #debug {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>🌱 Terra Air Dashboard</h1>

<div id="data">Chargement...</div>

<div id="debug">Debug...</div>

<script>
const API_URL = "https://similar-scenarios-leslie-buyer.trycloudflare.com/data";

async function loadData() {
  try {
    document.getElementById("debug").innerText = "Connexion à " + API_URL;

    const res = await fetch(API_URL);

    document.getElementById("debug").innerText += "\nStatus: " + res.status;

    const text = await res.text();
    document.getElementById("debug").innerText += "\nRéponse brute:\n" + text;

    const d = JSON.parse(text);

    document.getElementById("data").innerHTML = `
      <div class="card">🌡 Air<br>${d["terra-air/temp_air"]} °C</div>
      <div class="card">🌱 Sol<br>${d["terra-air/temp_sol"]} °C</div>
      <div class="card">💧 Hum air<br>${d["terra-air/humidite_air"]} %</div>
      <div class="card">🌿 Hum sol<br>${d["terra-air/hum_sol"]} %</div>
      <div class="card">📈 Pression<br>${d["terra-air/pression"]} hPa</div>
      <div class="card">🚰 Réservoir<br>${d["terra-air/reservoir"]}</div>
      <div class="card">⏰ Heure<br>${d["terra-air/heure"]}</div>
    `;

  } catch (e) {
    document.getElementById("data").innerHTML = "❌ Erreur connexion API";
    document.getElementById("debug").innerText += "\nERREUR:\n" + e;
  }
}

setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
